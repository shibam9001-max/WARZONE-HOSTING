<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Server Plans</title>  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      overflow-x: hidden;
      background: black;
    }

    /* Neon animated background */
    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1603736070723-5c5b0b5b7c2d') center/cover;
      filter: brightness(0.3) saturate(1.5);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0,255,200,0.15), rgba(0,0,0,0.9));
      z-index: -1;
    }

    .page {
      display: none;
      padding: 50px;
      text-align: center;
    }

    .active {
      display: block;
    }

    h1 {
      text-shadow: 0 0 10px cyan, 0 0 20px blue;
    }

    .btn {
      padding: 15px 30px;
      background: linear-gradient(45deg, #00f0ff, #ff00ff);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px cyan;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px magenta;
    }

    .plans {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      border: 1px solid cyan;
      border-radius: 15px;
      padding: 20px;
      backdrop-filter: blur(5px);
      box-shadow: 0 0 15px rgba(0,255,255,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px cyan;
    }

    .price {
      color: #00ff99;
      font-size: 20px;
      margin: 10px 0;
    }

    .buy {
      background: linear-gradient(45deg, #ffcc00, #ff6600);
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .buy:hover {
      transform: scale(1.05);
    }

    /* floating cubes decoration */
    .cube {
      position: absolute;
      width: 40px;
      height: 40px;
      background: url('https://static.wikia.nocookie.net/minecraft_gamepedia/images/3/3c/Grass_Block_JE7_BE6.png') center/cover;
      animation: float 6s infinite ease-in-out;
      opacity: 0.6;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0); }
    }

  </style></head>
