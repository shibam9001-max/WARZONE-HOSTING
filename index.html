<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Server Plans</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }.page {
  display: none;
  padding: 40px;
}

.active {
  display: block;
}

.btn {
  padding: 12px 25px;
  background: #00c2ff;
  border: none;
  border-radius: 8px;
  color: black;
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
}

.plans {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #333;
}

.price {
  font-size: 20px;
  color: #00ff99;
  margin: 10px 0;
}

.buy {
  margin-top: 10px;
  background: #ffcc00;
  border: none;
  padding: 10px 15px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

  </style>
</head>
<body><!-- PAGE 1 --><div id="page1" class="page active">
  <h1>Welcome to Minecraft Hosting</h1>
  <p>Best Cheap & Powerful Server Plans</p>
  <button class="btn" onclick="goPage2()">Let's Go</button>
</div><!-- PAGE 2 --><div id="page2" class="page">
  <h1>Choose Your Plan</h1>  <div class="plans"><div class="card">
  <h3>Starter</h3>
  <p>2GB RAM</p>
  <div class="price">₹199</div>
  <button class="buy" onclick="buy()">Buy</button>
</div>

<div class="card">
  <h3>Basic</h3>
  <p>4GB RAM</p>
  <div class="price">₹399</div>
  <button class="buy" onclick="buy()">Buy</button>
</div>

<div class="card">
  <h3>Pro</h3>
  <p>6GB RAM</p>
  <div class="price">₹599</div>
  <button class="buy" onclick="buy()">Buy</button>
</div>

<div class="card">
  <h3>Ultra</h3>
  <p>8GB RAM</p>
  <div class="price">₹799</div>
  <button class="buy" onclick="buy()">Buy</button>
</div>

<div class="card">
  <h3>Monster</h3>
  <p>12GB RAM</p>
  <div class="price">₹999</div>
  <button class="buy" onclick="buy()">Buy</button>
</div>

<div class="card">
  <h3>God Tier</h3>
  <p>16GB RAM</p>
  <div class="price">₹1299</div>
  <button class="buy" onclick="buy()">Buy</button>
</div>

  </div>
</div><script>
  function goPage2() {
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
  }

  function buy() {
    window.open("https://discord.gg/YOUR_INVITE", "_blank");
  }
</script></body>
</html>
